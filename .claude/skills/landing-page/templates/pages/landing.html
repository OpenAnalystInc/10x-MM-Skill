<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{oneLiner}}">
  <title>{{projectName}}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family={{fontHeadingEncoded}}:wght@400;500;600;700&family={{fontBodyEncoded}}:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Skip Link -->
  <a href="#main" class="skip-link">Skip to content</a>

  {{> section-navbar}}

  <main id="main">
    {{> section-hero}}

    {{#hasFeatures}}
    {{> section-features}}
    {{/hasFeatures}}

    {{#hasTestimonials}}
    {{> section-testimonials}}
    {{/hasTestimonials}}

    {{#hasFaq}}
    {{> section-faq}}
    {{/hasFaq}}

    {{> section-cta}}
  </main>

  {{> section-footer}}

  <!-- WebMCP Integration (MANDATORY) -->
  <script src="https://cdn.jsdelivr.net/npm/webmcp@latest/webmcp.js" defer></script>

  <!-- Page Scripts -->
  <script src="js/main.js" defer></script>
</body>
</html>
