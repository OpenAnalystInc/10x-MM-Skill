<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{oneLiner}}">
  <title>{{projectName}}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family={{fontHeadingEncoded}}:wght@400;500;600;700&family={{fontBodyEncoded}}:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <main id="main">
    <!-- Hero with Form -->
    <section class="hero hero--split" id="hero" data-section="hero">
      <div class="container hero-container">
        <div class="hero-content">
          <h1 class="hero-title">{{headline}}</h1>
          <p class="hero-subtitle">{{subheadline}}</p>

          {{#benefits}}
          <ul class="hero-benefits">
            {{#items}}
            <li class="benefit-item">
              <svg class="benefit-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M16.667 5L7.5 14.167 3.333 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              {{text}}
            </li>
            {{/items}}
          </ul>
          {{/benefits}}
        </div>

        <div class="hero-form-container">
          {{> component-lead-form}}
        </div>
      </div>
    </section>

    {{#hasFeatures}}
    {{> section-features}}
    {{/hasFeatures}}

    {{#hasTestimonials}}
    {{> section-testimonials}}
    {{/hasTestimonials}}
  </main>

  {{> section-footer}}

  <script src="https://cdn.jsdelivr.net/npm/webmcp@latest/webmcp.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
