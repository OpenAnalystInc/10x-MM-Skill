<!-- Features Section -->
<section class="features section" id="features" data-section="features">
  <div class="container">
    <div class="section-header">
      <h2>{{#copy}}{{featuresHeadline}}{{/copy}}{{^copy}}Why Choose Us{{/copy}}</h2>
      {{#copy}}{{#featuresSubtitle}}<p class="section-subtitle">{{featuresSubtitle}}</p>{{/featuresSubtitle}}{{/copy}}
    </div>
    <div class="features-grid">
      {{#features}}
      <article class="feature-card animate-on-scroll">
        <div class="feature-icon" aria-hidden="true">
          {{#icon}}{{{icon}}}{{/icon}}
          {{^icon}}
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="var(--color-primary)" opacity="0.1"/><path d="M24 16v8m0 0v8m0-8h8m-8 0h-8" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round"/></svg>
          {{/icon}}
        </div>
        <h3 class="feature-title">{{title}}</h3>
        <p class="feature-desc">{{description}}</p>
      </article>
      {{/features}}
    </div>
  </div>
</section>
