<!-- Final CTA Section -->
<section class="cta-section section" id="cta" data-section="cta">
  <div class="container">
    <div class="cta-content">
      <h2 class="cta-headline">{{ctaHeadline}}</h2>
      {{#ctaText}}<p class="cta-text">{{ctaText}}</p>{{/ctaText}}
      <a href="#" class="btn btn-primary btn-lg cta-button"
         toolname="final-cta" tooldescription="Main conversion action">{{ctaButton}}</a>
      {{#hasCtaReassurance}}
      <p class="cta-reassurance">{{ctaReassurance}}</p>
      {{/hasCtaReassurance}}
    </div>
  </div>
</section>
